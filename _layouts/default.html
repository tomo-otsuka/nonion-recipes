<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
    </div>
  </header>

  <main class="container">
    {% if page.url != '/' and page.url != '/index.html' %}
    <nav class="breadcrumbs">
      <a href="{{ '/' | relative_url }}">Home</a> / 
      <span>{{ page.title }}</span>
    </nav>
    {% endif %}

    <div class="page-content">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: "%Y" }} Nonion Recipes. Built with ♥️.</p>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Add interactive checkboxes to ingredient lists (all unordered lists in content)
      const ingredientLists = document.querySelectorAll(".page-content ul");
      ingredientLists.forEach(ul => {
        ul.classList.add("ingredient-list");
        ul.querySelectorAll("li").forEach(li => {
          li.addEventListener("click", () => {
            li.classList.toggle("checked");
          });
        });
      });

      // Add elegant counters to instruction lists (all ordered lists in content)
      const instructionLists = document.querySelectorAll(".page-content ol");
      instructionLists.forEach(ol => {
        ol.classList.add("instruction-list");
      });
    });
  </script>
</body>
</html>
